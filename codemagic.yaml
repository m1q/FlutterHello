workflows:
  flutter-android:
    name: Flutter Android Debug
    max_build_duration: 60
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
